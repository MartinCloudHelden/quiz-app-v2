services:
  web:
    image: quiz-web:local
    ports:
      - 3000:3000
    environment:
      INTERNAL_API_ORIGIN: $INTERNAL_API_ORIGIN
      NEXT_PUBLIC_QUIZ_QUESTION_LIMIT: $NEXT_PUBLIC_QUIZ_QUESTION_LIMIT
    depends_on:
      - api

  api:
    image: quiz-api:local
    restart: always
    environment:
      API_PORT: 4000
      DATABASE_URL: postgres://quiz:quiz@db:5432/quiz_app
      QUIZ_QUESTION_LIMIT: 10
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
      POSTGRES_DB: quiz_app
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./services/db/init:/docker-entrypoint-initdb.d:ro

volumes:
  db-data:
